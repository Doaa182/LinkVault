<!doctype html>

<html>
  <head>
    <!-- meta tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- fontawesome icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <!-- title and favicon -->
    <title>Registration App | Bookmarks Page</title>
    <link
      rel="shortcut icon"
      href="./Assets/bookmark-icon.png"
      type="image/png"
    />

    <!-- css links -->
    <link rel="stylesheet" href="./CSS/bootstrap.min.css" />
    <link rel="stylesheet" href="./CSS/media_query.css" />
    <link rel="stylesheet" href="CSS/components.css" />
    <link rel="stylesheet" href="./CSS/shared.css" />
  </head>

  <body>
    <nav></nav>

    <div class="h1-wapper text-center text-white">
      <h1 class="position-relative d-inline-block mb-3 mt-2">All Bookmarks</h1>
    </div>

    <main>
      <div class="container mt-5 mb-4 px-3 py-4 middle-container">
        <!-- Title -->
        <div class="mb-3 w-75 m-auto">
          <label class="form-label fw-semibold">Bookmark Title</label>
          <input
            id="bookmarkTitle"
            type="text"
            class="form-control"
            placeholder="e.g. Facebook"
            onkeyup="changeBookmarkInputStyle(this)"
          />
        </div>

        <!-- URL -->
        <div class="mb-3 w-75 m-auto">
          <label class="form-label fw-semibold">Bookmark URL</label>
          <input
            id="bookmarkUrl"
            type="text"
            class="form-control"
            placeholder="e.g. https://facebook.com"
            onkeyup="changeBookmarkInputStyle(this)"
            onchange="changeBookmarkInputStyle(this)"
          />
        </div>

        <!-- Category dropdown -->
        <div class="mb-3 w-75 m-auto">
          <label class="form-label fw-semibold">Bookmark Category</label>
          <select id="bookmarkCategory" class="form-control"></select>
        </div>

        <!-- add btn -->
        <div class="text-center">
          <button
            class="btn btn-success px-5 add-btn"
            onclick="addOrEditBookmark()"
          >
            Add Bookmark
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>
      </div>

      <div
        class="filter-bar mb-3 d-flex gap-2 flex-wrap justify-content-center align-items-center"
      >
        <!-- Category -->
        <select id="filterCategory" class="form-select w-auto">
          <option value="">All Categories</option>
        </select>

        <!-- Search -->
        <input
          type="text"
          id="filterSearch"
          class="form-control w-auto"
          placeholder="Search title or URL"
        />

        <!-- Favorites -->
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="filterFavorite" />
          <label class="form-check-label">Favorites only</label>
        </div>

        <!-- Archived -->
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="filterArchived" />
          <label class="form-check-label">Archived only</label>
        </div>

        <!-- Buttons -->
        <button class="btn btn-primary" onclick="applyFilters()">Apply</button>
        <button class="btn btn-secondary" onclick="clearFilters()">
          Clear
        </button>
      </div>
      <!-- table -->
      <div class="container p-0 table-search-wrap d-none">
        <table class="table text-center table-hover">
          <thead>
            <tr>
              <th>Index</th>
              <th>Bookmark Title</th>
              <th>Bookmarks Category</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="bookmarksTableBody"></tbody>
        </table>
      </div>

      <!-- empty state -->
      <div class="emptyBookmarksState text-center py-5 d-none">
        <i class="fa-solid fa-folder-open fa-4x mb-3 text-secondary"></i>

        <h3>No Bookmarks Yet</h3>
      </div>
    </main>

    <!-- modal -->
    <div
      class="modal fade d-none"
      id="exampleModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-4">
          <div class="modal-header border-0 p-0 mb-4">
            <div class="d-flex gap-2">
              <div class="red-circle rounded-circle"></div>
              <div class="yellow-circle rounded-circle"></div>
              <div class="green-circle rounded-circle"></div>
            </div>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body p-0">
            <ul class="list-unstyled">
              <li>
                <i class="fa-regular fa-circle-right p-2"></i>
                Title is required.
              </li>
              <li>
                <i class="fa-regular fa-circle-right p-2"></i>
                URL must be valid (http/https).
              </li>
              <li>
                <i class="fa-regular fa-circle-right p-2"></i>
                Category must be selected.
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- js links -->
    <script src="./JS/bootstrap.bundle.min.js"></script>
    <script src="./JS/ui.js"></script>
    <script src="./JS/api.js"></script>
    <script src="./JS/auth.js"></script>
    <script src="./JS/components.js"></script>
    <script src="./JS/bookmarks.js"></script>
  </body>
</html>
