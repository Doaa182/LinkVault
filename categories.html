<!doctype html>

<html>
  <head>
    <!-- meta tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- fontawesome icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <!-- title and favicon -->
    <title>Registration App | Categories Page</title>
    <link
      rel="shortcut icon"
      href="./Assets/categories-icon.png"
      type="image/png"
    />

    <!-- css links -->
    <link rel="stylesheet" href="./CSS/bootstrap.min.css" />
    <link rel="stylesheet" href="./CSS/media_query.css" />
    <link rel="stylesheet" href="./CSS/categories.css" />
  </head>

  <body>
    <header class="pt-3 pe-4 position-absolute end-0">
      <i class="fas fa-sign-out-alt fs-2 fw-semibold" onclick="signOut()"></i>
    </header>

    <div class="h1-wapper text-center text-white">
      <h1 class="position-relative d-inline-block mb-3 mt-2">All Categories</h1>
    </div>

    <main>
      <div class="container mt-5 mb-4 px-3 py-4 middle-container">
        <div class="row mb-2">
          <div class="col-12">
            <div class="mb-3 position-relative w-75 m-auto">
              <label for="CategoryName" class="form-label mb-2 fw-semibold">
                Category Name
              </label>
              <input
                type="text"
                class="form-control"
                id="CategoryName"
                placeholder="e.g. Productivity"
                onkeyup="changeInputStyle(this)"
              />
            </div>
          </div>
        </div>

        <div class="row mb-2">
          <div class="col-12">
            <div class="mb-3 position-relative w-75 m-auto">
              <label
                for="CategoryDescription"
                class="form-label mb-2 fw-semibold"
              >
                Category Description
              </label>
              <input
                type="text"
                class="form-control"
                id="CategoryDescription"
                placeholder="e.g. General tools, tips, and resources to improve efficiency and daily workflow."
                onkeyup="changeInputStyle(this)"
              />
            </div>
          </div>
        </div>

        <!-- add btn -->
        <div class="row">
          <div class="col">
            <div class="btn-wrapper text-center">
              <button
                type="button"
                class="btn btn-success px-5 add-btn"
                onclick="addOrEdit()"
              >
                Add
                <i class="fa-solid fa-plus"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- table & search bar -->
      <div class="container p-0 table-search-wrap d-none">
        <table class="table text-center table-hover">
          <thead>
            <th>Index</th>
            <th>Category Name</th>
            <th>Category Description</th>
            <th>Actions</th>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>

    <!-- modal -->
    <div
      class="modal fade d-none"
      id="exampleModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-4">
          <div class="modal-header border-0 p-0 mb-4">
            <div class="d-flex gap-2">
              <div class="red-circle rounded-circle"></div>
              <div class="yellow-circle rounded-circle"></div>
              <div class="green-circle rounded-circle"></div>
            </div>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body p-0">
            <!-- <p class="pb-2 mb-0">
              Category Name or Description is not valid, Please follow the rules
              below :
            </p> -->

            <ul class="list-unstyled">
              <li>
                <i class="fa-regular fa-circle-right p-2"></i>
                Category name must contain at least 3 characters. Letters,
                numbers, underscores, and spaces are allowed.
              </li>
              <li>
                <i class="fa-regular fa-circle-right p-2"></i>
                Category description must contain at least 1 character and can
                contain up to 300 characters.
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- js links -->
    <script src="./JS/bootstrap.bundle.min.js"></script>
    <script src="./JS/ui.js"></script>
    <script src="./JS/api.js"></script>
    <script src="./JS/auth.js"></script>
    <script src="./JS/main.js"></script>
  </body>
</html>
